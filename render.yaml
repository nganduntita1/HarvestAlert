services:
  - type: web
    name: harvestalert-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: harvestalert-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-netlify-app.netlify.app
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: harvestalert-db
    databaseName: harvestalert
    user: harvestalert
    plan: free
